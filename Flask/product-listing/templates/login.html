<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 400px; margin: auto; }
    h1 { margin-bottom: 20px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; font-weight: 600; }
    input {
      width: 100%; padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem; margin-bottom: 6px;
    }
    input.error-field { border-color: red; }
    .error { color: red; font-size: 0.82rem; margin-bottom: 12px; }
    .success { color: green; font-weight: 600; margin-bottom: 16px; }
    button {
      padding: 9px 20px; background: #4f46e5;
      color: white; border: none; border-radius: 4px;
      cursor: pointer; font-size: 0.95rem; width: 100%;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>

<h1>Login</h1>

{% if success %}
  <p class="success">✅ Login successful!</p>
{% endif %}

<form method="POST" action="/login">

  <label for="email">Email</label>
  <input
    type="text"
    id="email"
    name="email"
    value="{{ form_data.email }}"
    class="{{ 'error-field' if errors.email else '' }}"
    placeholder="Enter your email"
  />
  {% if errors.email %}
    <p class="error">{{ errors.email }}</p>
  {% endif %}

  <label for="password">Password</label>
  <input
    type="password"
    id="password"
    name="password"
    class="{{ 'error-field' if errors.password else '' }}"
    placeholder="Enter your password"
  />
  {% if errors.password %}
    <p class="error">{{ errors.password }}</p>
  {% endif %}

  <button type="submit">Login</button>

</form>

</body>
</html>
