<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Products</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f4f6f9; }
    h2 { margin-bottom: 6px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .cart-link {
      padding: 8px 16px; background: #4f46e5; color: white;
      text-decoration: none; border-radius: 6px; font-size: 0.9rem;
    }
    .cart-link:hover { background: #4338ca; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    th { background: #4f46e5; color: white; padding: 12px 16px; text-align: left; font-size: 0.9rem; }
    td { padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9ff; }

    .btn-add {
      padding: 6px 14px; background: #4f46e5; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .btn-add:hover { background: #4338ca; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>🛍️ Products</h2>
  <a href="/cart/" class="cart-link">🛒 View Cart</a>
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Price (₹)</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ p.name }}</td>
      <td>₹{{ "{:,}".format(p.price) }}</td>
      <td>
        <form method="POST" action="/products/add/{{ p.id }}">
          <button type="submit" class="btn-add">Add to Cart</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</body>
</html>
